<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSpace – Connexion</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <a class="logo" href="index.html">Event<span>Space</span></a>
    <h2>Connexion</h2>

    <div class="tab-switch">
      <button class="tab active" data-tab="particulier" onclick="switchTab('particulier')">Particulier</button>
      <button class="tab" data-tab="annonceur" onclick="switchTab('annonceur')">Annonceur</button>
    </div>

    <div class="demo-info" id="demoInfo">
      <strong>Comptes de démonstration :</strong><br/>
      <span id="demoHint">👤 Particulier — Email : <code>user@demo.fr</code> | Mot de passe : <code>demo1234</code></span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <label>Email
        <input type="email" id="loginEmail" required placeholder="vous@exemple.fr" autocomplete="email" />
      </label>
      <label>Mot de passe
        <div class="pass-wrap">
          <input type="password" id="loginPass" required placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="eye-btn" onclick="togglePass('loginPass')">👁</button>
        </div>
      </label>
      <div class="form-row">
        <label class="checkbox"><input type="checkbox" id="rememberMe" /> Se souvenir de moi</label>
        <a href="#" class="link-small">Mot de passe oublié ?</a>
      </div>
      <button type="submit" class="btn btn-primary full">Se connecter</button>
      <p id="loginError" class="form-error"></p>
    </form>
    <p class="auth-switch">Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a></p>

    <div class="legal-note">
      En vous connectant, vous acceptez nos <a href="#">CGU</a> et notre <a href="#">politique de confidentialité</a>.
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
