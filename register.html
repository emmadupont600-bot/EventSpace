<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSpace – Inscription</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <a class="logo" href="index.html">Event<span>Space</span></a>
    <h2>Créer un compte</h2>

    <div class="tab-switch">
      <button class="tab active" data-tab="particulier" onclick="switchRegTab('particulier')">Particulier</button>
      <button class="tab" data-tab="annonceur" onclick="switchRegTab('annonceur')">Annonceur</button>
    </div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <label>Prénom <input type="text" id="regFirstName" required placeholder="Jean" /></label>
        <label>Nom <input type="text" id="regLastName" required placeholder="Dupont" /></label>
      </div>
      <label>Email <input type="email" id="regEmail" required placeholder="vous@exemple.fr" /></label>
      <label>Téléphone <input type="tel" id="regPhone" placeholder="+33 6 00 00 00 00" /></label>
      <label>Mot de passe
        <div class="pass-wrap">
          <input type="password" id="regPass" required placeholder="8 caractères min." minlength="8" />
          <button type="button" class="eye-btn" onclick="togglePass('regPass')">👁</button>
        </div>
      </label>
      <div id="annonceurFields" style="display:none">
        <hr/><p class="section-label">Informations du lieu</p>
        <label>Nom de l'établissement <input type="text" id="regVenueName" placeholder="Salle des Étoiles" /></label>
        <label>Adresse complète <input type="text" id="regAddress" placeholder="12 rue de la Paix, 75001 Paris" /></label>
        <label>SIRET (facultatif) <input type="text" id="regSiret" placeholder="123 456 789 00012" maxlength="17" /></label>
        <label>Type de lieu
          <select id="regVenueType">
            <option>Salle de réception</option>
            <option>Jardin / Espace extérieur</option>
            <option>Rooftop</option>
            <option>Loft / Studio</option>
            <option>Château / Manoir</option>
            <option>Salle de réunion</option>
            <option>Autre</option>
          </select>
        </label>
      </div>
      <label class="checkbox">
        <input type="checkbox" id="regCGU" required />
        J'accepte les <a href="legal/cgu.html" target="_blank">CGU</a>, les <a href="legal/cgv.html" target="_blank">CGV</a> et la <a href="legal/privacy.html" target="_blank">politique de confidentialité</a>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="regNewsletter" />
        J'accepte de recevoir les actualités EventSpace (facultatif)
      </label>
      <button type="submit" class="btn btn-primary full">Créer mon compte</button>
      <p id="registerError" class="form-error"></p>
    </form>
    <p class="auth-switch">Déjà un compte ? <a href="login.html">Se connecter</a></p>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
