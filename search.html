<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSpace – Rechercher un lieu</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet" />
  <style>
    .venue-fav-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.9); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; color: #ccc; transition: color .2s; }
    .venue-fav-btn.active, .venue-fav-btn:hover { color: #e11d48; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .empty-state h3 { margin-bottom: 8px; }
  </style>
</head>
<body>
  <nav id="navbar">
    <div class="nav-inner">
      <a class="logo" href="index.html">Event<span>Space</span></a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Accueil</a>
        <a href="search.html" class="active">Chercher un lieu</a>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost" id="navLoginBtn">Connexion</a>
        <a href="register.html" class="btn btn-primary" id="navRegisterBtn">S'inscrire</a>
        <button class="burger" id="burger" aria-label="menu">&#9776;</button>
      </div>
    </div>
  </nav>

  <div class="search-page">
    <aside class="filters" id="filtersPanel">
      <h3>Filtres</h3>
      <button class="filters-close" id="filtersClose">✕</button>
      <label>Ville / Code postal
        <input type="text" id="fCity" placeholder="Paris, Lyon, Beauvais…" />
      </label>
      <label>Type d'espace
        <select id="fType">
          <option value="">Tous les types</option>
          <option value="salle">Salle de réception</option>
          <option value="rooftop">Rooftop</option>
          <option value="loft">Loft / Studio</option>
          <option value="jardin">Jardin / Extérieur</option>
          <option value="chateau">Château / Manoir</option>
        </select>
      </label>
      <label>Capacité minimale
        <input type="number" id="fCap" placeholder="Ex: 20" min="1" />
      </label>
      <label>Budget max. (€/h)
        <input type="range" id="fBudget" min="10" max="1000" value="1000" step="10" />
        <span id="fBudgetVal">1000 €/h</span>
      </label>
      <label>Note minimale
        <select id="fRating">
          <option value="0">Toutes les notes</option>
          <option value="4">4+ ⭐</option>
          <option value="4.5">4.5+ ⭐</option>
        </select>
      </label>
      <button class="btn btn-primary" onclick="applyFilters()">Appliquer les filtres</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="resetFilters()">Réinitialiser</button>
    </aside>

    <main class="results">
      <div class="results-header">
        <h2>Lieux disponibles <span id="resultCount"></span></h2>
        <button class="btn btn-ghost" id="filtersToggle">⚙ Filtres</button>
        <select id="sortBy" onchange="applyFilters()">
          <option value="rating">Mieux notés</option>
          <option value="price_asc">Prix croissant</option>
          <option value="price_desc">Prix décroissant</option>
        </select>
      </div>
      <div class="venues-grid" id="searchResults"></div>
    </main>
  </div>

  <footer style="text-align:center;padding:20px;font-size:.8rem;color:#aaa;border-top:1px solid #e2e8f0;margin-top:40px">
    © 2026 EventSpace
  </footer>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
